      else if(name==="planning"){S.wizard.planning=val;render();}
      else if(name==="trackingMode"){S.wizard.trackingMode=val;render();}
      else if(name==="assignTo"){window._newItemAssignTo=val;window._newItemTravelers=[];render();}
      else if(name==="logType"){S.modal={...S.modal,logType:val};render();}
    } else if(S.screen==="dashboard"){
      if(name==="logType"){S.modal={...S.modal,logType:val};render();}
    }
  }));

  // Radio lists
  document.querySelectorAll("[data-radio]").forEach(el=>el.addEventListener("click",e=>{
    const name=e.currentTarget.dataset.radio,val=e.currentTarget.dataset.val;
    if(name==="paymentMethod"){S.wizard.payment={...S.wizard.payment,method:val};render();}
    else if(name==="trackingMode"){S.wizard.trackingMode=val;render();}
  }));

  // Trip type selection
  document.querySelectorAll("[data-triptype]").forEach(el=>el.addEventListener("click",e=>{S.wizard.tripType=e.currentTarget.dataset.triptype;S.wizard.isAllInclusive=false;render();}));

  // Breakdown fields
  document.querySelectorAll(".breakdown-inp").forEach(inp=>inp.addEventListener("input",e=>{S.wizard.breakdown={...S.wizard.breakdown,[e.target.dataset.key]:e.target.value};render();document.getElementById("w-total")?.focus&&null;}));

  // Dashboard
  document.getElementById("trip-selector")?.addEventListener("change",e=>{S.activeId=e.target.value;S.viewMode="group";render();});
  document.getElementById("view-selector")?.addEventListener("change",e=>{S.viewMode=e.target.value;render();});
  document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",e=>{S.activeTab=e.target.dataset.tab;render();}));

  // Overview: log modal
  document.getElementById("btn-open-log-modal")?.addEventListener("click",()=>{
    const trip=S.trips.find(t=>t.id===S.activeId)||S.trips[0];
    const allT=trip.planning==="group"?[{id:"me",name:"Me"},...trip.travelers]:[{id:"me",name:"Me"}];
    S.modal={type:"log",logType:"payment",travelerId:allT[0]?.id||"me",amount:"",note:""};render();
  });
  document.querySelectorAll(".btn-delete-log").forEach(btn=>btn.addEventListener("click",e=>{
    const lid=e.target.dataset.lid;const trip=S.trips.find(t=>t.id===S.activeId);
    if(trip){updateTrip(trip.id,{paymentLogs:(trip.paymentLogs||[]).filter(l=>l.id!==lid)});}
  }));

  // Modal
  document.getElementById("btn-modal-cancel")?.addEventListener("click",()=>{S.modal=null;render();});
  document.getElementById("btn-close-guide")?.addEventListener("click",()=>{S.modal=null;render();});
  document.getElementById("guide-modal-overlay")?.addEventListener("click",e=>{if(e.target===e.currentTarget){S.modal=null;render();}});
  document.getElementById("btn-modal-save")?.addEventListener("click",()=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    const allT=trip.planning==="group"?[{id:"me",name:"Me"},...trip.travelers]:[{id:"me",name:"Me"}];
    const amt=Number(document.getElementById("log-amount")?.value||0);if(amt<=0){alert("Please enter an amount greater than $0.");return;}
    const tId=trip.planning==="group"?(document.getElementById("log-traveler")?.value||allT[0]?.id):allT[0]?.id;
    const entry={id:uid(),travelerId:tId,amount:amt,type:S.modal.logType||"payment",note:document.getElementById("log-note")?.value||"",date:today()};
    updateTrip(trip.id,{paymentLogs:[...(trip.paymentLogs||[]),entry]});
    S.modal=null;render();
  });
  document.getElementById("log-traveler")?.addEventListener("change",e=>{if(S.modal)S.modal.travelerId=e.target.value;});
  document.querySelectorAll("[data-seg=logType]").forEach(btn=>btn.addEventListener("click",e=>{if(S.modal)S.modal.logType=e.target.dataset.val;render();}));

  // Checklist
  document.querySelectorAll(".group-check").forEach(inp=>inp.addEventListener("change",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    updateTrip(trip.id,{checklist:{...trip.checklist,[e.target.dataset.key]:e.target.checked}});
  }));
  document.querySelectorAll(".group-check-cost").forEach(inp=>inp.addEventListener("input",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    updateTrip(trip.id,{checklist:{...trip.checklist,[e.target.dataset.key+"_cost"]:e.target.value}});
  }));
  document.querySelectorAll(".traveler-check").forEach(inp=>inp.addEventListener("change",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    const tc={...trip.travelerChecklists};tc[e.target.dataset.tid]={...(tc[e.target.dataset.tid]||{}),[e.target.dataset.key]:e.target.checked};
    updateTrip(trip.id,{travelerChecklists:tc});
  }));
  document.querySelectorAll(".traveler-check-cost").forEach(inp=>inp.addEventListener("input",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    const tc={...trip.travelerChecklists};tc[e.target.dataset.tid]={...(tc[e.target.dataset.tid]||{}),[e.target.dataset.key+"_cost"]:e.target.value};
    updateTrip(trip.id,{travelerChecklists:tc});
  }));
  document.querySelectorAll(".custom-check").forEach(inp=>inp.addEventListener("change",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    const ci=e.target.dataset.cid,tid=e.target.dataset.tid;
    updateTrip(trip.id,{customChecklistItems:(trip.customChecklistItems||[]).map(c=>c.id===ci?{...c,checked:{...(c.checked||{}),[tid]:e.target.checked}}:c)});
  }));
  document.querySelectorAll(".custom-check-cost").forEach(inp=>inp.addEventListener("input",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    const ci=e.target.dataset.cid,tid=e.target.dataset.tid;
    updateTrip(trip.id,{customChecklistItems:(trip.customChecklistItems||[]).map(c=>c.id===ci?{...c,costs:{...(c.costs||{}),[tid]:e.target.value}}:c)});
  }));
  document.querySelectorAll(".btn-remove-custom").forEach(btn=>btn.addEventListener("click",e=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    updateTrip(trip.id,{customChecklistItems:(trip.customChecklistItems||[]).filter(c=>c.id!==e.target.dataset.cid)});
  }));
  document.querySelectorAll(".assign-traveler-chk").forEach(inp=>inp.addEventListener("change",e=>{
    const tid=e.target.dataset.tid;
    window._newItemTravelers=window._newItemTravelers||[];
    if(e.target.checked){if(!window._newItemTravelers.includes(tid))window._newItemTravelers.push(tid);}
    else{window._newItemTravelers=window._newItemTravelers.filter(x=>x!==tid);}
    render();
  }));
  document.getElementById("btn-add-custom-item")?.addEventListener("click",()=>{
    const trip=S.trips.find(t=>t.id===S.activeId);if(!trip)return;
    const label=document.getElementById("new-item-label")?.value||"";if(!label.trim())return;
    const assignTo=(window._newItemAssignTo||"all")==="all"?"all":(window._newItemTravelers||[]);
    if(Array.isArray(assignTo)&&assignTo.length===0){alert("Please select at least one traveler, or choose All Travelers.");return;}
    const ci={id:uid(),label:label.trim(),assignTo,checked:{},costs:{}};
    updateTrip(trip.id,{customChecklistItems:[...(trip.customChecklistItems||[]),ci]});
    window._newItemAssignTo="all";window._newItemTravelers=[];
  });

  // Print
  document.getElementById("btn-print")?.addEventListener("click",()=>{
    const trip=S.trips.find(t=>t.id===S.activeId)||S.trips[0];
    const allT=trip.planning==="group"?[{id:"me",name:"Me"},...trip.travelers]:[{id:"me",name:"Me"}];
    doPrint(trip,allT,S.viewMode);
  });

  // Settings
  document.querySelectorAll("[data-theme]").forEach(btn=>btn.addEventListener("click",e=>{S.theme=e.currentTarget.dataset.theme;saveState();render();}));
  document.getElementById("s-name")?.addEventListener("input",e=>{const trip=S.trips.find(t=>t.id===S.activeId);if(trip)updateTrip(trip.id,{name:e.target.value});});
  document.getElementById("s-dest")?.addEventListener("input",e=>{const trip=S.trips.find(t=>t.id===S.activeId);if(trip)updateTrip(trip.id,{destination:e.target.value});});
  document.getElementById("s-dep")?.addEventListener("change",e=>{const trip=S.trips.find(t=>t.id===S.activeId);if(trip)updateTrip(trip.id,{departureDate:e.target.value});});
  document.getElementById("s-ret")?.addEventListener("change",e=>{const trip=S.trips.find(t=>t.id===S.activeId);if(trip)updateTrip(trip.id,{returnDate:e.target.value});});
  document.getElementById("s-notes")?.addEventListener("input",e=>{const trip=S.trips.find(t=>t.id===S.activeId);if(trip)updateTrip(trip.id,{notes:e.target.value});});
  document.getElementById("btn-new-trip-settings")?.addEventListener("click",()=>{S.screen="setup";S.wizard=newVacation();S.wizardStep=1;render();});
  document.getElementById("btn-new-trip")?.addEventListener("click",()=>{S.screen="setup";S.wizard=newVacation();S.wizardStep=1;render();});
  document.querySelectorAll("[data-delete-trip]").forEach(btn=>btn.addEventListener("click",e=>{
    const id=e.target.dataset.deleteTrp||e.target.getAttribute("data-delete-trip");
    if(confirm(`Remove this trip?`)){
      S.trips=S.trips.filter(t=>t.id!==id);
      if(S.activeId===id&&S.trips.length>0)S.activeId=S.trips[0].id;
      saveState();render();
    }
  }));
  document.getElementById("btn-export-json")?.addEventListener("click",exportJSON);
  document.getElementById("btn-import-json")?.addEventListener("click",importJSON);
  document.getElementById("btn-save-with-data")?.addEventListener("click",saveAppWithData);
}

function syncWizardInputs(){
  const w=S.wizard;
  ["w-name","w-dest","w-goal","w-notes","w-total","w-cursaved","w-apr","w-monthly"].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const v=el.value;
    if(id==="w-name")w.name=v;else if(id==="w-dest")w.destination=v;else if(id==="w-goal")w.timelineGoal=v;
    else if(id==="w-notes")w.notes=v;else if(id==="w-total")w.estimatedTotal=v;
    else if(id==="w-cursaved")w.payment={...w.payment,currentSaved:v};
    else if(id==="w-apr")w.payment={...w.payment,apr:v};
    else if(id==="w-monthly")w.payment={...w.payment,monthlyPayment:v};
  });
  document.querySelectorAll(".traveler-name").forEach(inp=>{const tid=inp.dataset.tid;w.travelers=w.travelers.map(t=>t.id===tid?{...t,name:inp.value}:t);});
  document.querySelectorAll(".breakdown-inp").forEach(inp=>{w.breakdown={...w.breakdown,[inp.dataset.key]:inp.value};});
}

// ── PWA: Register service worker for offline caching ─────────────────────
(function(){
  if(!("serviceWorker" in navigator))return;
  const swCode=`
const CACHE="bob-vacation-v1";
const FILES=["./"];
self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES)).then(()=>self.skipWaiting()));});
self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.status===200)c.put(e.request,res.clone());return res;}))));});
`;
  try{
    const blob=new Blob([swCode],{type:"application/javascript"});
    const swUrl=URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl,{scope:"./"}).catch(()=>{});
  }catch(e){}
})();

let _deferredInstall=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  _deferredInstall=e;
  const banner=document.getElementById("install-banner");
  if(banner){banner.classList.add("visible");}
});
window.addEventListener("appinstalled",()=>{
  _deferredInstall=null;
  const banner=document.getElementById("install-banner");
  if(banner){banner.classList.remove("visible");}
});

render();

// Bind install banner buttons (after render so DOM exists)
setTimeout(()=>{
  document.getElementById("btn-install-accept")?.addEventListener("click",()=>{
    if(_deferredInstall){_deferredInstall.prompt();_deferredInstall.userChoice.then(()=>{_deferredInstall=null;document.getElementById("install-banner")?.classList.remove("visible");});}
  });
  document.getElementById("btn-install-dismiss")?.addEventListener("click",()=>{
    document.getElementById("install-banner")?.classList.remove("visible");
    sessionStorage.setItem("bob-install-dismissed","1");
  });
  if(sessionStorage.getItem("bob-install-dismissed")){
    document.getElementById("install-banner")?.classList.remove("visible");
  }
},100);
